<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQLD 오답노트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --surface-2: #f1f0ec;
      --border: rgba(0,0,0,0.1);
      --border-md: rgba(0,0,0,0.18);
      --text: #1a1a18;
      --text-2: #5f5e5a;
      --text-3: #9a9892;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;

      --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-600: #185FA5; --blue-800: #0C447C;
      --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-600: #0F6E56; --teal-800: #085041;
      --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-600: #854F0B; --amber-800: #633806;
      --red-50: #FCEBEB; --red-100: #F7C1C1; --red-600: #A32D2D; --red-800: #791F1F;
      --green-50: #EAF3DE; --green-100: #C0DD97; --green-600: #3B6D11; --green-800: #27500A;
      --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-600: #993C1D; --coral-800: #712B13;
      --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-800: #26215C;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181816;
        --surface: #222220;
        --surface-2: #2c2c2a;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.18);
        --text: #f0ede8;
        --text-2: #a8a6a0;
        --text-3: #6a6864;
      }
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.25rem 1rem 4rem;
    }

    /* Header */
    .header {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .sqld-badge {
      background: var(--blue-50); color: var(--blue-800);
      font-size: 11px; font-weight: 700; padding: 3px 8px;
      border-radius: var(--radius-sm); border: 1px solid var(--blue-100);
      letter-spacing: 0.5px;
    }
    .app-title { font-size: 18px; font-weight: 700; }

    .header-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .io-btn {
      font-size: 12px; padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-md);
      background: var(--surface);
      color: var(--text-2);
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: background 0.12s;
    }
    .io-btn:hover { background: var(--surface-2); }
    .io-btn.export { border-color: var(--teal-100); background: var(--teal-50); color: var(--teal-800); }
    .io-btn.export:hover { background: var(--teal-100); }
    .io-btn.import { border-color: var(--blue-100); background: var(--blue-50); color: var(--blue-800); }
    .io-btn.import:hover { background: var(--blue-100); }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 1.25rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 8px;
      text-align: center;
    }
    .stat-label { font-size: 11px; color: var(--text-2); margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
    .stat-value.blue { color: var(--blue-600); }
    .stat-value.green { color: var(--teal-600); }
    .stat-value.red { color: var(--red-600); }

    /* Tabs */
    .controls {
      margin-bottom: 1rem;
    }
    .tab-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .tab {
      font-size: 13px; padding: 6px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
    }
    .tab:hover { background: var(--surface-2); }
    .tab.active {
      background: var(--blue-50); color: var(--blue-800);
      border-color: var(--blue-100); font-weight: 500;
    }
    .add-btn {
      font-size: 13px; padding: 6px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-md);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.12s;
    }
    .add-btn:hover { background: var(--surface-2); }

    /* Problem cards */
    .problem-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      overflow: hidden;
      transition: box-shadow 0.12s;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px;
      cursor: pointer;
    }
    .card-meta { flex: 1; min-width: 0; }
    .card-top {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 5px;
    }
    .q-num { font-size: 12px; color: var(--text-3); font-weight: 500; }
    .cat-badge, .diff-badge, .result-badge {
      font-size: 11px; padding: 2px 7px;
      border-radius: var(--radius-sm);
      font-weight: 500; white-space: nowrap;
    }
    .q-text {
      font-size: 14px; color: var(--text);
      line-height: 1.55;
      word-break: keep-all;
    }
    .card-btns {
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .icon-btn {
      width: 30px; height: 30px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--text-2);
      transition: background 0.12s;
    }
    .icon-btn:hover { background: var(--surface-2); }

    .card-body { padding: 0 14px 14px; }
    .divider { height: 1px; background: var(--border); margin: 0 0 12px; }

    /* Choices */
    .choices { margin-bottom: 10px; }
    .choice-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      margin-bottom: 5px;
      font-size: 13px; color: var(--text);
      cursor: pointer;
      transition: all 0.12s;
      line-height: 1.5;
      word-break: keep-all;
    }
    .choice-item:hover { background: var(--surface-2); }
    .choice-item.selected { background: var(--blue-50); border-color: var(--blue-100); color: var(--blue-800); }
    .choice-item.correct-reveal { background: var(--green-50); border-color: var(--green-100); color: var(--green-800); }
    .choice-item.wrong-reveal { background: var(--red-50); border-color: var(--red-100); color: var(--red-800); }
    .choice-num-label { font-weight: 700; flex-shrink: 0; min-width: 16px; }

    /* Result */
    .result-msg {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500; margin-bottom: 10px;
    }
    .result-msg.correct { background: var(--green-50); color: var(--green-800); border: 1px solid var(--green-100); }
    .result-msg.wrong { background: var(--red-50); color: var(--red-800); border: 1px solid var(--red-100); }

    /* Action buttons */
    .answer-section { display: flex; gap: 6px; flex-wrap: wrap; }
    .answer-btn {
      font-size: 13px; padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-md);
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s;
    }
    .answer-btn:hover { background: var(--surface); }

    /* Note */
    .note-box {
      background: var(--amber-50); border: 1px solid var(--amber-100);
      border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 10px;
    }
    .note-label { font-size: 11px; color: var(--amber-600); font-weight: 700; margin-bottom: 4px; }
    .note-content { font-size: 13px; color: var(--text); line-height: 1.65; white-space: pre-wrap; word-break: keep-all; }

    /* Empty */
    .empty {
      text-align: center; padding: 4rem 1rem;
      color: var(--text-2); font-size: 14px; line-height: 2;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 1rem;
      overflow-y: auto;
    }
    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-md);
      padding: 1.5rem;
      width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
      position: relative;
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 1rem; }
    .field-group { margin-bottom: 1rem; }
    .field-label { font-size: 12px; color: var(--text-2); margin-bottom: 5px; font-weight: 500; }
    input[type=text], textarea, select {
      width: 100%; font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border-md);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      outline: none;
    }
    input[type=text]:focus, textarea:focus, select:focus {
      border-color: var(--blue-600);
    }
    textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
    .choice-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .choice-row input[type=text] { flex: 1; }
    .choice-num { font-size: 13px; font-weight: 700; width: 20px; flex-shrink: 0; color: var(--text-2); text-align: center; }
    .correct-radio { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-2); white-space: nowrap; flex-shrink: 0; }
    .correct-radio input[type=radio] { width: auto; accent-color: var(--blue-600); }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-cancel {
      font-size: 13px; padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent; color: var(--text-2);
      cursor: pointer; font-family: inherit;
    }
    .btn-cancel:hover { background: var(--surface-2); }
    .btn-save {
      font-size: 13px; padding: 8px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--blue-100);
      background: var(--blue-50); color: var(--blue-800);
      cursor: pointer; font-family: inherit; font-weight: 700;
    }
    .btn-save:hover { background: var(--blue-100); }

    /* Toast */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      background: var(--text); color: var(--bg);
      font-size: 13px; padding: 9px 18px;
      border-radius: var(--radius-md);
      z-index: 999; opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none; white-space: nowrap;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .toast.show { opacity: 1; }

    /* Mobile */
    @media (max-width: 480px) {
      .container { padding: 1rem 0.75rem 4rem; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .stat-value { font-size: 20px; }
      .header-actions { gap: 5px; }
      .io-btn { font-size: 11px; padding: 5px 9px; }
      .tab { font-size: 12px; padding: 5px 10px; }
      .add-btn { font-size: 12px; padding: 5px 12px; }
      .choice-item { font-size: 13px; }
      .modal { padding: 1.25rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <span class="sqld-badge">SQLD</span>
        <span class="app-title">오답노트</span>
      </div>
      <div class="header-actions">
        <button class="io-btn export" onclick="exportJSON()">↓ 내보내기</button>
        <button class="io-btn import" onclick="document.getElementById('importFile').click()">↑ 가져오기</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      </div>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="controls">
    <div class="tab-row">
      <button class="tab active" onclick="setTab('all',this)">전체</button>
      <button class="tab" onclick="setTab('unsolved',this)">미풀이</button>
      <button class="tab" onclick="setTab('wrong',this)">틀림</button>
      <button class="tab" onclick="setTab('correct',this)">맞춤</button>
    </div>
    <div>
      <button class="add-btn" onclick="openAddModal()">+ 문제 추가</button>
    </div>
  </div>

  <div id="problemList"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">오답 문제 추가</div>
    <div class="field-group">
      <div class="field-label">문제 내용</div>
      <textarea id="fQuestion" placeholder="문제를 입력하세요"></textarea>
    </div>
    <div class="field-group">
      <div class="field-label">카테고리</div>
      <select id="fCategory">
        <option>데이터 모델링</option>
        <option>SQL 기본</option>
        <option>SQL 활용</option>
        <option>관리 구문</option>
        <option>데이터베이스 기본</option>
        <option>기타</option>
      </select>
    </div>
    <div class="field-group">
      <div class="field-label">난이도</div>
      <select id="fDiff">
        <option value="하">하</option>
        <option value="중" selected>중</option>
        <option value="상">상</option>
      </select>
    </div>
    <div class="field-group">
      <div class="field-label">보기 (정답 선택 버튼 클릭)</div>
      <div id="choiceInputs"></div>
    </div>
    <div class="field-group">
      <div class="field-label">내 오답노트 해설</div>
      <textarea id="fNote" placeholder="내 식대로 설명을 적어두세요..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveQuestion()">저장</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'sqld_wrongnote_v2';
  let problems = [];
  let currentTab = 'all';
  let expandedIds = new Set();
  let selectedAnswers = {};
  let revealedNotes = new Set();
  let submittedIds = new Set();
  let editingId = null;
  let correctAnswer = null;

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) problems = JSON.parse(raw);
    } catch(e) { problems = []; }
    renderAll();
  }

  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(problems)); } catch(e) {}
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function exportJSON() {
    if (problems.length === 0) { showToast('저장된 문제가 없습니다'); return; }
    const blob = new Blob([JSON.stringify(problems, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `sqld_오답노트_${date}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast(`${problems.length}개 문제를 내보냈습니다`);
  }

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error();
        const valid = data.filter(p => p.id && p.question && Array.isArray(p.choices) && p.correct);
        if (valid.length === 0) { showToast('유효한 문제가 없습니다'); return; }
        const existingIds = new Set(problems.map(p => p.id));
        const newOnes = valid.filter(p => !existingIds.has(p.id));
        const dupes = valid.length - newOnes.length;
        problems = [...problems, ...newOnes];
        saveData(); renderAll();
        let msg = `${newOnes.length}개 문제를 가져왔습니다`;
        if (dupes > 0) msg += ` (중복 ${dupes}개 제외)`;
        showToast(msg);
      } catch(err) { showToast('올바른 JSON 파일이 아닙니다'); }
      e.target.value = '';
    };
    reader.readAsText(file);
  }

  const CAT_COLORS = {
    '데이터 모델링': ['#E6F1FB','#B5D4F4','#0C447C'],
    'SQL 기본':      ['#E1F5EE','#9FE1CB','#085041'],
    'SQL 활용':      ['#EEEDFE','#CECBF6','#26215C'],
    '관리 구문':     ['#FAECE7','#F5C4B3','#712B13'],
    '데이터베이스 기본': ['#FAEEDA','#FAC775','#633806'],
    '기타':          ['#F1EFE8','#D3D1C7','#444441'],
  };

  function catBadge(cat) {
    const c = CAT_COLORS[cat] || CAT_COLORS['기타'];
    return `<span class="cat-badge" style="background:${c[0]};border:1px solid ${c[1]};color:${c[2]}">${cat}</span>`;
  }
  function diffBadge(d) {
    const m = { 상:['#FCEBEB','#F7C1C1','#791F1F'], 중:['#FAEEDA','#FAC775','#633806'], 하:['#EAF3DE','#C0DD97','#27500A'] };
    const c = m[d] || m['중'];
    return `<span class="diff-badge" style="background:${c[0]};border:1px solid ${c[1]};color:${c[2]}">${d}</span>`;
  }
  function resultBadge(p) {
    if (!submittedIds.has(p.id)) return '';
    const ok = selectedAnswers[p.id] === p.correct;
    return ok
      ? `<span class="result-badge" style="background:#EAF3DE;border:1px solid #C0DD97;color:#27500A">정답</span>`
      : `<span class="result-badge" style="background:#FCEBEB;border:1px solid #F7C1C1;color:#791F1F">오답</span>`;
  }

  function renderAll() { renderStats(); renderList(); }

  function renderStats() {
    const total = problems.length;
    const solved = problems.filter(p => submittedIds.has(p.id)).length;
    const correct = problems.filter(p => submittedIds.has(p.id) && selectedAnswers[p.id] === p.correct).length;
    const wrong = solved - correct;
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="stat-label">전체 문제</div><div class="stat-value blue">${total}</div></div>
      <div class="stat-card"><div class="stat-label">풀이 완료</div><div class="stat-value">${solved}</div></div>
      <div class="stat-card"><div class="stat-label">맞춤</div><div class="stat-value green">${correct}</div></div>
      <div class="stat-card"><div class="stat-label">틀림</div><div class="stat-value red">${wrong}</div></div>
    `;
  }

  function getFiltered() {
    if (currentTab === 'unsolved') return problems.filter(p => !submittedIds.has(p.id));
    if (currentTab === 'correct')  return problems.filter(p => submittedIds.has(p.id) && selectedAnswers[p.id] === p.correct);
    if (currentTab === 'wrong')    return problems.filter(p => submittedIds.has(p.id) && selectedAnswers[p.id] !== p.correct);
    return problems;
  }

  function renderList() {
    const list = document.getElementById('problemList');
    const fp = getFiltered();
    if (fp.length === 0) {
      list.innerHTML = `<div class="empty">문제가 없습니다.<br>위 "+ 문제 추가" 버튼으로 추가해보세요.</div>`;
      return;
    }
    list.innerHTML = fp.map((p, idx) => renderCard(p, idx)).join('');
  }

  function renderCard(p, idx) {
    const expanded = expandedIds.has(p.id);
    const submitted = submittedIds.has(p.id);
    const selected = selectedAnswers[p.id];
    const noteVisible = revealedNotes.has(p.id);

    const choicesHtml = p.choices.map((c, i) => {
      let cls = 'choice-item';
      if (submitted) {
        if (i+1 === p.correct) cls += ' correct-reveal';
        else if (selected === i+1) cls += ' wrong-reveal';
      } else if (selected === i+1) cls += ' selected';
      const click = submitted ? '' : `onclick="selectAnswer(${p.id},${i+1})"`;
      return `<div class="${cls}" ${click}><span class="choice-num-label">${i+1}</span><span>${esc(c)}</span></div>`;
    }).join('');

    let resultHtml = '';
    if (submitted) {
      const ok = selected === p.correct;
      resultHtml = `<div class="result-msg ${ok?'correct':'wrong'}">${ok ? '✓ 정답입니다!' : `✗ 오답 — 정답은 ${p.correct}번입니다`}</div>`;
    }

    const noteHtml = (noteVisible && p.note)
      ? `<div class="note-box"><div class="note-label">내 해설 노트</div><div class="note-content">${esc(p.note)}</div></div>`
      : '';

    const noteLbl = noteVisible ? '해설 숨기기' : '해설 보기';
    let btns = `<button class="answer-btn" onclick="toggleNote(${p.id})">${noteLbl}</button>`;
    if (!submitted) btns = `<button class="answer-btn" onclick="submitAnswer(${p.id})">채점하기</button>` + btns;
    if (submitted)  btns += `<button class="answer-btn" onclick="resetAnswer(${p.id})">다시 풀기</button>`;

    return `
    <div class="problem-card" id="card-${p.id}">
      <div class="card-header" onclick="toggleCard(${p.id})">
        <div class="card-meta">
          <div class="card-top">
            <span class="q-num">Q${idx+1}</span>
            ${catBadge(p.category)} ${diffBadge(p.diff)} ${resultBadge(p)}
          </div>
          <div class="q-text">${esc(p.question)}</div>
        </div>
        <div class="card-btns" onclick="event.stopPropagation()">
          <button class="icon-btn" onclick="openEditModal(${p.id})" title="수정">✎</button>
          <button class="icon-btn" onclick="deleteCard(${p.id})" title="삭제">✕</button>
          <button class="icon-btn" onclick="toggleCard(${p.id})">${expanded?'▲':'▼'}</button>
        </div>
      </div>
      ${expanded ? `
      <div class="card-body">
        <div class="divider"></div>
        <div class="choices">${choicesHtml}</div>
        ${resultHtml}
        <div class="answer-section">${btns}</div>
        ${noteHtml}
      </div>` : ''}
    </div>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function toggleCard(id) {
    expandedIds.has(id) ? expandedIds.delete(id) : expandedIds.add(id);
    renderList();
  }
  function selectAnswer(id, num) { selectedAnswers[id] = num; renderList(); }
  function submitAnswer(id) {
    if (!selectedAnswers[id]) { showToast('보기를 선택해주세요'); return; }
    submittedIds.add(id); renderAll();
  }
  function resetAnswer(id) {
    delete selectedAnswers[id]; submittedIds.delete(id); revealedNotes.delete(id); renderAll();
  }
  function toggleNote(id) {
    revealedNotes.has(id) ? revealedNotes.delete(id) : revealedNotes.add(id);
    renderList();
  }
  function deleteCard(id) {
    if (!confirm('이 문제를 삭제할까요?')) return;
    problems = problems.filter(p => p.id !== id);
    expandedIds.delete(id); delete selectedAnswers[id];
    submittedIds.delete(id); revealedNotes.delete(id);
    saveData(); renderAll();
  }
  function setTab(t, el) {
    currentTab = t;
    document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  function openAddModal() {
    editingId = null; correctAnswer = null;
    document.getElementById('modalTitle').textContent = '오답 문제 추가';
    document.getElementById('fQuestion').value = '';
    document.getElementById('fCategory').value = '데이터 모델링';
    document.getElementById('fDiff').value = '중';
    document.getElementById('fNote').value = '';
    renderChoiceInputs(null);
    document.getElementById('modalOverlay').style.display = 'flex';
  }
  function openEditModal(id) {
    const p = problems.find(x => x.id === id);
    if (!p) return;
    editingId = id; correctAnswer = p.correct;
    document.getElementById('modalTitle').textContent = '문제 수정';
    document.getElementById('fQuestion').value = p.question;
    document.getElementById('fCategory').value = p.category;
    document.getElementById('fDiff').value = p.diff;
    document.getElementById('fNote').value = p.note || '';
    renderChoiceInputs(p);
    document.getElementById('modalOverlay').style.display = 'flex';
  }
  function renderChoiceInputs(p) {
    const vals = p ? p.choices : ['','','','',''];
    document.getElementById('choiceInputs').innerHTML = vals.map((v, i) => `
      <div class="choice-row">
        <span class="choice-num">${i+1}</span>
        <input type="text" value="${esc(v)}" placeholder="보기 ${i+1}" id="ch${i}">
        <label class="correct-radio">
          <input type="radio" name="correct" value="${i+1}" ${correctAnswer===i+1?'checked':''} onchange="correctAnswer=${i+1}">
          정답
        </label>
      </div>`).join('');
  }
  function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
  function overlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
  function saveQuestion() {
    const q = document.getElementById('fQuestion').value.trim();
    if (!q) { showToast('문제 내용을 입력해주세요'); return; }
    const choices = [0,1,2,3,4].map(i => document.getElementById('ch'+i).value.trim());
    if (choices.some(c => !c)) { showToast('보기를 모두 입력해주세요'); return; }
    if (!correctAnswer) { showToast('정답 보기를 선택해주세요'); return; }
    const cat = document.getElementById('fCategory').value;
    const diff = document.getElementById('fDiff').value;
    const note = document.getElementById('fNote').value.trim();
    if (editingId !== null) {
      const idx = problems.findIndex(p => p.id === editingId);
      if (idx !== -1) problems[idx] = { ...problems[idx], question:q, category:cat, diff, choices, correct:correctAnswer, note };
    } else {
      problems.push({ id: Date.now(), question:q, category:cat, diff, choices, correct:correctAnswer, note });
    }
    closeModal(); saveData(); renderAll();
    showToast(editingId !== null ? '문제를 수정했습니다' : '문제를 추가했습니다');
  }

  loadData();
</script>
</body>
</html>
